<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNC Desktop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: Arial, sans-serif;
        }
        .vnc-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
        }
        .vnc-placeholder {
            text-align: center;
            color: #fff;
            padding: 20px;
        }
        .vnc-placeholder h2 {
            margin-bottom: 10px;
            color: #4CAF50;
        }
        .vnc-placeholder p {
            margin: 5px 0;
            opacity: 0.8;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff4444;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="vnc-container">
        <div class="vnc-placeholder">
            <h2><span class="status-indicator"></span>VNC Desktop</h2>
            <p>Desktop streaming is currently unavailable</p>
            <p>Please configure VNC server or use WebRTC streaming</p>
            <p><small>Status: Disconnected</small></p>
        </div>
    </div>

    <script>
        // Basic VNC client placeholder
        console.log('VNC client loaded');
        
        // Check for WebRTC availability as fallback
        if (window.RTCPeerConnection) {
            console.log('WebRTC is available as fallback');
        }
        
        // Update status periodically
        setInterval(() => {
            // This would normally check VNC server status
            console.log('Checking VNC server status...');
        }, 5000);
    </script>
</body>
</html>
